name: CabApp CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test Backend ─────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cabapp_test
          POSTGRES_USER: cabuser
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cabapp_test
          DB_USER: cabuser
          DB_PASSWORD: testpassword
          JWT_SECRET: test_jwt_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci
        run: npm test --if-present

  # ── Build Frontend ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost/api
          REACT_APP_SOCKET_URL: http://localhost
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

  # ── Deploy to Server (on push to main) ─────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/cabapp
            git pull origin main
            cp .env.production .env
            docker compose pull
            docker compose up -d --build
            docker compose exec -T postgres psql -U cabuser -d cabapp -f /docker-entrypoint-initdb.d/init.sql 2>/dev/null || true
            docker image prune -f
            echo "✅ Deployed at $(date)"
