version: '3.9'

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cabapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-cabapp}
      POSTGRES_USER:     ${DB_USER:-cabuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cabpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cabuser} -d ${DB_NAME:-cabapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cabapp_network

  # ── Redis (optional caching) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cabapp_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cabapp_network

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cabapp_backend
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      PORT:                  5000
      DB_HOST:               postgres
      DB_PORT:               5432
      DB_NAME:               ${DB_NAME:-cabapp}
      DB_USER:               ${DB_USER:-cabuser}
      DB_PASSWORD:           ${DB_PASSWORD:-cabpassword123}
      JWT_SECRET:            ${JWT_SECRET:-change_this_jwt_secret_in_production}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      JWT_EXPIRES_IN:        7d
      JWT_REFRESH_EXPIRES_IN: 30d
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY:       ${STRIPE_CURRENCY:-inr}
      EMAIL_HOST:            ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT:            ${EMAIL_PORT:-587}
      EMAIL_USER:            ${EMAIL_USER}
      EMAIL_PASS:            ${EMAIL_PASS}
      EMAIL_FROM:            ${EMAIL_FROM:-CabApp <no-reply@cabapp.com>}
      FRONTEND_URL:          ${FRONTEND_URL:-http://localhost}
      REDIS_URL:             redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cabapp_network

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL:          ${REACT_APP_API_URL:-http://localhost/api}
        REACT_APP_SOCKET_URL:       ${REACT_APP_SOCKET_URL:-http://localhost}
        REACT_APP_STRIPE_PUBLIC_KEY: ${REACT_APP_STRIPE_PUBLIC_KEY}
    container_name: cabapp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - cabapp_network

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cabapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cabapp_network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_logs:

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  cabapp_network:
    driver: bridge
